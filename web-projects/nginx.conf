# Wisdom Portal 
server {
    listen 80;
    server_name wisdom.clydeford.net;
    
    root /usr/share/nginx/wisdom;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Cache static assets
