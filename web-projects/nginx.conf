# River Guide AI Chat
server {
    listen 80;
    server_name riverguide.clydeford.net;
    
    root /usr/share/nginx/rivers2;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Proxy API calls to MCP container
    # Use Docker's embedded DNS resolver so nginx starts even if mcp is temporarily down
    location /api/mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $mcp_upstream http://mcp:3004;
        proxy_pass $mcp_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
    
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|txt)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # CSP for Claude API calls
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com;" always;
}

